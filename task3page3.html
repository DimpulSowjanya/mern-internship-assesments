<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Training Institute - Schedule</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #182a44, #121f33); color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        
        .navbar { background-color: #0a111a; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 1px solid #142235; }
        .logo { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .logo::before { content: "📋"; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { color: #9bb0c9; text-decoration: none; font-size: 0.9rem; padding: 5px 10px; }
        .nav-links a:hover, .nav-links a.active { color: #ffffff; }

        .container { flex: 1; padding: 60px 20px; max-width: 750px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2.2rem; font-weight: 500; text-align: center; margin-bottom: 35px; letter-spacing: 0.5px; }

        .schedule-table { width: 100%; border-collapse: collapse; background-color: rgba(255, 255, 255, 0.02); margin-top: 10px; }
        .schedule-table th, .schedule-table td { border: 1px solid #41566e; padding: 14px; text-align: center; font-size: 0.95rem; }
        
        .schedule-table th { background-color: #b93322; color: #ffffff; font-weight: 500; letter-spacing: 0.5px; }
        .schedule-table td { color: #e1e7ee; }
        .schedule-table tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.04); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ABC Training Institute</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="schedule.html" class="active">Schedule</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Course Schedule</h1>
        
        <table class="schedule-table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Trainer</th>
                    <th>Duration</th>
                    <th>Mode</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>HTML & CSS</td>
                    <td>Ashoka</td>
                    <td>2 Weeks</td>
                    <td>Online</td>
                </tr>
                <tr>
                    <td>Java</td>
                    <td>Ms. Rahul</td>
                    <td>4 Weeks</td>
                    <td>Offline</td>
                </tr>
                <tr>
                    <td>React JS</td>
                    <td>Mr. Anita</td>
                    <td>3 Weeks</td>
                    <td>Online</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
