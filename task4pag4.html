<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Training Institute - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #182a44, #121f33); color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        
        .navbar { background-color: #0a111a; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 1px solid #142235; }
        .logo { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .logo::before { content: "📋"; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { color: #9bb0c9; text-decoration: none; font-size: 0.9rem; padding: 5px 10px; }
        .nav-links a:hover, .nav-links a.active { color: #ffffff; }

        .container { flex: 1; padding: 50px 20px; max-width: 550px; margin: 0 auto; width: 100%; }
        h1 { font-size: 2.2rem; font-weight: 500; text-align: center; margin-bottom: 35px; letter-spacing: 0.5px; }

        .form-row { display: flex; align-items: center; margin-bottom: 15px; }
        .form-row label { width: 130px; font-size: 0.95rem; color: #e2eaf4; }
        
        .form-input { 
            flex: 1; 
            padding: 7px 12px; 
            border: 1px solid #4a5d73; 
            border-radius: 2px; 
            background-color: #ffffff; 
            color: #111a24; 
            font-size: 0.9rem; 
        }
        
        textarea.form-input { height: 75px; resize: none; }
        
        .gender-options { display: flex; gap: 20px; align-items: center; }
        .gender-options label { width: auto; display: flex; align-items: center; gap: 6px; cursor: pointer; }

        .submit-btn {
            background-color: #b93322;
            color: #ffffff;
            border: none;
            padding: 10px 35px;
            font-size: 0.95rem;
            border-radius: 3px;
            cursor: pointer;
            display: block;
            margin: 30px auto 0 auto;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .submit-btn:hover { background-color: #9c2718; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ABC Training Institute</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="schedule.html">Schedule</a></li>
            <li><a href="register.html" class="active">Register</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Student Registration</h1>
        
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Registration Saved!');">
            <div class="form-row">
                <label for="name">Name:</label>
                <input type="text" id="name" class="form-input" required>
            </div>

            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" id="email" class="form-input" required>
            </div>

            <div class="form-row">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" class="form-input" required>
            </div>

            <div class="form-row">
                <label for="course">Select Course:</label>
                <select id="course" class="form-input">
                    <option value="html-css">HTML & CSS</option>
                    <option value="java">Java</option>
                    <option value="react">React JS</option>
                    <option value="python">Python</option>
                </select>
            </div>

            <div class="form-row">
                <label>Gender:</label>
                <div class="gender-options">
                    <label><input type="radio" name="gender" value="male" checked> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            <div class="form-row">
                <label for="message">Message:</label>
                <textarea id="message" class="form-input"></textarea>
            </div>

            <button type="submit" class="submit-btn">Register Now</button>
        </form>
    </div>

</body>
</html>
